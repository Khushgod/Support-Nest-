services:
  app:
    image: supportnest:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supportnest-app
    restart: unless-stopped
    ports:
      - "3009:3000"
    env_file:
      - .env.production
    volumes:
      - supportnest-data:/app/.data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  supportnest-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/supportnest/data
